name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    name: Full Test Suite
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run all tests
        run: bundle exec rake test
